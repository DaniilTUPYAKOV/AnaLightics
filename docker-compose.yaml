networks:
  analightics-network:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: ${PROJECT_NAME}-postgres
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - analightics-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.10
    container_name: ${PROJECT_NAME}-clickhouse
    ports:
      - "${CLICKHOUSE_PORT_EXTERNAL}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - analightics-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    container_name: ${PROJECT_NAME}-kafka
    ports:
      - "${KAFKA_PORT_EXTERNAL}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_PORT_INTERNAL},CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT_INTERNAL},EXTERNAL://localhost:${KAFKA_PORT_EXTERNAL}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - analightics-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
      
  init_db:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: init_db-image
    container_name: ${PROJECT_NAME}-init-db
    command: python -m backend.init_db
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - analightics-network
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_TABLE: ${CLICKHOUSE_TABLE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api-image
    container_name: ${PROJECT_NAME}-api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port ${API_PORT} --reload
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - analightics-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT_INTERNAL}
      EVENT_TOPIC: ${EVENT_TOPIC}
      API_KEY: ${API_KEY}

  consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: consumer-image
    container_name: ${PROJECT_NAME}-consumer
    command: python -m backend.consumer.main
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      init_db:
        condition: service_completed_successfully
    networks:
      - analightics-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_PORT_INTERNAL}
      EVENT_TOPIC: ${EVENT_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_TABLE: ${CLICKHOUSE_TABLE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID}
      CONSUMER_AUTO_OFFSET_RESET: ${CONSUMER_AUTO_OFFSET_RESET}
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES}
      CONSUMER_RETRY_DELAY: ${CONSUMER_RETRY_DELAY}
      CONSUMER_BATCH_SIZE: ${CONSUMER_BATCH_SIZE}
      CONSUMER_FLUSH_INTERVAL: ${CONSUMER_FLUSH_INTERVAL}

volumes:
  postgres_data:
  clickhouse_data:
  kafka_data:
